<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oneplus Store page</title>
    <style>
        *{
         box-sizing: border-box; margin: 0; padding: 0;
        }

        body{
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background: beige;
        }
    header{
        background:wheat;
        color:black;
        padding: 20px 10%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position:sticky;
        top:0;
        z-index: 10;
    }
    header a{
        color:black;
        text-decoration: none;
        margin: 40px;
        font-size: 15px;

    }
    h1{
        text-align: center;

    }
    .product-grid{
       display: grid;
        grid-template-columns:repeat(3,1fr); gap: 20px;
        padding:0 10% 50px    10%;
    }
    .card{
        background: red;
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        transition: transform 0.3s ease;

    }
    .card:hover{
        transform: translateY(-10px) scale(1.2);
    }
    .card img{width:100%; height: 220px; object-fit: contain;
    
    } 
    .buy-btn{
        display: inline-block;
        padding: 10px;
        background: black;
        color: whitesmoke;
        text-decoration: none;
        border-radius: 10px;
        margin-top: 15px;




    }

    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <nav>
        <a href="https://www.oneplus.com/us">Oneplus Phone</a>
        <a href="https://www.oneplus.com/us">Oneplus tablet</a>
         <a href="https://www.oneplus.com/us">Oneplus wearable</a>
          <a href="https://www.oneplus.com/us">Oneplus Buds</a>
          <a href="https://www.oneplus.com/us">Oneplus stylo</a>
          
       </nav>
    </header>
    <h1>Welcome To Oneplus Tech Store </h1>
    <div class="product-grid">
    <div class="card"><img src="Oneplus 15.png"><h3>Oneplus 15 </h3><a href="#" class="buy-btn">Buy</a></div>
    <div class="card"><img src="Oneplus buds 4.webp"><h3>Oneplus buds 4</h3><a href="#" class="buy-btn">Buy</a></div>
    <div class="card"><img src="Oneplus Stylo 2.png"><h3> Oneplus Stylo 2</h3><a href="#" class="buy-btn">Buy</a></div>
     <div class="card"><img src="Oneplus Tablet 3.webp"><h3>Oneplus Tablet 3</h3><a href="#" class="buy-btn">Buy</a></div>
     <div class="card"><img src="Oneplus watch 3 webp.webp"><h3>Oneplus Watch 3</h3><a href="#" class="buy-btn">Buy</a></div>
</div>
    
</body>
</html>
